# Deploy: build → push to ECR → run migrations as a one-off task → roll the ECS service.
# Auth via GitHub OIDC (no static AWS keys). Runs after CI passes on main.
name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-prod
  cancel-in-progress: false

permissions:
  id-token: write   # required for OIDC
  contents: read

env:
  AWS_REGION: eu-west-1                 # match infra
  ECR_REPO: rowbound-backend
  ECS_CLUSTER: rowbound-prod
  ECS_SERVICE: rowbound-prod
  TASK_FAMILY: rowbound-prod
  CONTAINER_NAME: app

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::<ACCOUNT_ID>:role/rowbound-prod-github-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push image
        id: build
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
        run: |
          IMAGE="$REGISTRY/${ECR_REPO}:${GITHUB_SHA}"
          docker build -t "$IMAGE" ./backend
          docker push "$IMAGE"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

      # Register a new task-def revision pointing at the freshly built image.
      - name: Render new task definition
        id: taskdef
        run: |
          aws ecs describe-task-definition --task-definition "$TASK_FAMILY" \
            --query 'taskDefinition' > taskdef.json
          # swap the image, strip read-only fields
          python - "$taskdef_image" <<'PY'
          import json, sys
          d = json.load(open("taskdef.json"))
          for c in d["containerDefinitions"]:
              if c["name"] == "app":
                  c["image"] = "${{ steps.build.outputs.image }}"
          for k in ["taskDefinitionArn","revision","status","requiresAttributes",
                    "compatibilities","registeredAt","registeredBy"]:
              d.pop(k, None)
          json.dump(d, open("taskdef.new.json","w"))
          PY
          ARN=$(aws ecs register-task-definition --cli-input-json file://taskdef.new.json \
                 --query 'taskDefinition.taskDefinitionArn' --output text)
          echo "arn=$ARN" >> "$GITHUB_OUTPUT"

      # Run migrations as a ONE-OFF task BEFORE shifting traffic. Never from app startup.
      - name: Run Alembic migrations (one-off task)
        run: |
          SUBNETS=$(aws ssm get-parameter --name /rowbound/prod/private_subnets --query Parameter.Value --output text 2>/dev/null || echo "")
          # If you don't store these in SSM, hardcode subnet-/sg- ids (from terraform output) here:
          SUBNETS="${SUBNETS:-subnet-AAA,subnet-BBB}"
          SG="sg-APP"
          TASK_ARN=$(aws ecs run-task \
            --cluster "$ECS_CLUSTER" \
            --launch-type FARGATE \
            --task-definition "${{ steps.taskdef.outputs.arn }}" \
            --network-configuration "awsvpcConfiguration={subnets=[$SUBNETS],securityGroups=[$SG],assignPublicIp=DISABLED}" \
            --overrides '{"containerOverrides":[{"name":"app","command":["alembic","upgrade","head"]}]}' \
            --query 'tasks[0].taskArn' --output text)
          echo "Waiting for migration task $TASK_ARN ..."
          aws ecs wait tasks-stopped --cluster "$ECS_CLUSTER" --tasks "$TASK_ARN"
          CODE=$(aws ecs describe-tasks --cluster "$ECS_CLUSTER" --tasks "$TASK_ARN" \
                  --query 'tasks[0].containers[0].exitCode' --output text)
          echo "Migration exit code: $CODE"
          test "$CODE" = "0"

      - name: Deploy service (rolling)
        run: |
          aws ecs update-service --cluster "$ECS_CLUSTER" --service "$ECS_SERVICE" \
            --task-definition "${{ steps.taskdef.outputs.arn }}" --force-new-deployment
          aws ecs wait services-stable --cluster "$ECS_CLUSTER" --services "$ECS_SERVICE"

  # Frontend (Nuxt) is deployed by Amplify's own GitHub integration on push to main.
  # If you'd rather drive it here, add a job that builds and calls `aws amplify start-job`.
