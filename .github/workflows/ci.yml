name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  secrets-guard:
    name: Secrets — no tracked .env / obvious keys
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fail on a tracked .env file
        run: |
          if git ls-files | grep -E '(^|/)\.env$'; then
            echo "::error::A .env file is tracked. Remove it (git rm --cached) and use .env.example."
            exit 1
          fi
          echo "OK — no tracked .env files."
      - name: Fail on obvious committed secrets
        run: |
          # Stripe live/restricted keys, AWS access keys, PEM private keys.
          if git grep -nE '(sk_live_|rk_live_|AKIA[0-9A-Z]{16}|-----BEGIN (RSA |EC )?PRIVATE KEY-----)' \
               -- ':!*.example' ':!*lock*' ':!.github/workflows/*'; then
            echo "::error::Possible committed secret detected (see matches above)."
            exit 1
          fi
          echo "OK — no obvious secrets detected."

  backend:
    name: Backend — Alembic + pytest
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: datamarketplace_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: datamarketplace_test
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"
      SECRET_KEY: ci-test-secret-not-for-prod
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_HOURS: "2"
      FRONTEND_URL: http://localhost:3000

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Apply migrations (Alembic — never create_all)
        working-directory: backend
        run: python -m alembic upgrade head

      - name: Seed reference data (licenses)
        working-directory: backend
        run: python -m app.seed

      - name: Run tests
        working-directory: backend
        run: python -m pytest tests/ -q

  ingest-service:
    name: Ingest service — cargo fmt/clippy/test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ingest-service
      - name: Format
        working-directory: ingest-service
        run: cargo fmt --check
      - name: Clippy
        working-directory: ingest-service
        run: cargo clippy --all-targets -- -D warnings
      - name: Test (incl. Python-parity hashes)
        working-directory: ingest-service
        run: cargo test
      - name: Check the queue worker compiles (P4)
        working-directory: ingest-service
        run: cargo check --features queue

  frontend:
    name: Frontend — Nuxt build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Unit tests (Vitest)
        working-directory: frontend
        run: npm test

      - name: Build
        working-directory: frontend
        run: npm run build
