name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Backend — Alembic + pytest
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: datamarketplace_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: datamarketplace_test
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"
      SECRET_KEY: ci-test-secret-not-for-prod
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_HOURS: "2"
      FRONTEND_URL: http://localhost:3000

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Apply migrations (Alembic — never create_all)
        working-directory: backend
        run: python -m alembic upgrade head

      - name: Seed reference data (licenses)
        working-directory: backend
        run: python -m app.seed

      - name: Run tests
        working-directory: backend
        run: python -m pytest tests/ -q

  frontend:
    name: Frontend — Nuxt build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build
